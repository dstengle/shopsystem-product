# workflow.toml -- run/environment config for workflow.fabro (bc-shop loop).
# Slice 2 Leg 1 (epic lead-6k1r). Branch fabro-spike. SPIKE / THROWAWAY.
#
# NOTE ON RETRY: node-level retry is NOT configured here. In fabro v0.254.0 retry
# is DOT-graph-native (empirically pinned): a node carries `retry=N`, an optional
# `retry_target`, and the graph declares `fallback_retry_target`. Those live in
# workflow.fabro (prime=3, health=2, integ=2, emit_*=2; graph
# fallback_retry_target="halt"). The 01b draft's `[run.retry.nodes]` table was a
# guess and is NOT a v0.254.0 config key -- superseded by the graph attributes.

_version = 1

[workflow]
graph = "workflow.fabro"

# ---- RUNTIME INPUTS (Slice 3 Leg B, empirically pinned) --------------------
# Declared inputs are referenced in node `prompt=` / graph `goal=` ONLY, via
# minijinja `{{ inputs.NAME }}` (fabro embeds minijinja 2.19). `-I NAME=VALUE`
# overrides these defaults at `fabro run`. Confirmed: `{{ inputs.BC_NAME }}`
# resolves from `-I BC_NAME=...`; the old shell-style `${BC_NAME}` is NOT
# honored (minijinja leaves it literal -> reaches the shell -> expands empty).
# NOTE: inputs are NOT available in `script=` (literal text) NOR as env vars in
# a native command-node sandbox (proven: `$BC_NAME` -> empty). Any node that
# must parameterize on BC_NAME/WORK_ID therefore stays an AGENT command node
# (its `prompt=` is templated), never a native `script=` command node.
[run.inputs]
BC_NAME = "shopsystem-example"     # canonical BC name; override per BC at run
WORK_ID = "lead-0000"              # work_id of the message under service

[run.environment]
id = "local"                       # ephemeral in-container fabro server (00a s5)

[environments.local]
provider = "local"                 # runs in the current process/cwd INSIDE the BC
                                   # container; inherits parent env so HTTPS_PROXY ->
                                   # agent-vault reaches every node (00a s4.3, OQ1).
                                   # The provider KEY rides agent-vault: fabro's vault
                                   # holds only dummies (vaults/default/secrets.json).

[run.pull_request]
enabled = false                    # integrating-to-main (the `integ` node) is the
                                   # SOLE integration authority. Leaving fabro's native
                                   # PR creation on would open a competing integration
                                   # path -> disable (01b s2 caution; 01a P20/ADR-018).
