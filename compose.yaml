# compose.yaml — lead-shop ops scaffolding (shop-owned, PDR-003 path F).
#
# Brings up the product postgres (and the agent-vault credential broker)
# that the lead shop and its BC clones share. Run it via ./bin/shop-shell,
# or directly with:
#
#     docker compose up -d postgres
#
# PRODUCT-SCOPED: every name below derives from the bootstrap product slug
# (shopsystem) so a second product can run alongside other live products
# without colliding on container names, the docker network, named volumes,
# or host
# ports. The slug is the bootstrap --shop-name with a trailing "-product"
# stripped (e.g. dummyco-product -> dummyco), read from .claude/shop/name.md.
#
# The pgdata bind source is derived from SHOPSYSTEM_DATA (default
# ${HOME}/.local/share/shopsystem) and deliberately lives OUTSIDE this
# repository so a `docker compose up` never pollutes the shop tree with a
# pgdata/ directory.
#
# HOST PORTS are product-distinct: the published postgres host port defaults
# to a deterministic slug-derived value (5829 =
# 5432 + crc32(slug) % 1000) and is env-overridable via
# SHOPSYSTEM_POSTGRES_PORT, so two products never bind the same host
# port.
services:
  postgres:
    image: postgres:16
    container_name: shopsystem-postgres
    # postgres runs as its DEFAULT in-image uid — NO `user:` override (lead-kz4j
    # revert of 25be1dd7). Forcing the host uid made permissions hard to manage
    # and the chown forced the FOOTING-container uid (not the real host user)
    # anyway; the image's normal root->postgres init owns the bind-mounted pgdata.
    networks:
      - shopsystem
    environment:
      POSTGRES_USER: shopsystem
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-shopsystem}"
      POSTGRES_DB: shopsystem
    volumes:
      - type: bind
        source: "${SHOPSYSTEM_DATA:-${HOME}/.local/share/shopsystem}/pgdata"
        target: /var/lib/postgresql/data
    ports:
      - "${SHOPSYSTEM_POSTGRES_PORT:-5829}:5432"
    healthcheck:
      # Probe the CONFIGURED POSTGRES_USER (shopsystem), not the literal
      # "postgres" role, which does not exist here and logs
      # 'role "postgres" does not exist' every interval (lead-sgxd 87acbbbe).
      test: ["CMD-SHELL", "pg_isready -U shopsystem"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The credential broker. It holds the product's secrets and proxies
  # outbound traffic, injecting credentials on the wire so no agent container
  # ever sees raw secret material. The image is the real agent-vault broker
  # image (product-neutral: the same reference renders for every product slug
  # — it is NOT a <slug>-baked literal). The broker auto-unseals from
  # AGENT_VAULT_MASTER_PASSWORD, sourced from the instance environment (see
  # the rendered top-level .env.example).
  #
  # The CONTAINER ports are fixed: 14321 (broker API) and 14322 (HTTPS proxy
  # — the endpoint bin/shop-shell wires as HTTPS_PROXY=<broker>:14322). The
  # published HOST ports default to deterministic slug-derived values
  # (15082 = 14321 + crc32(slug) % 1000,
  # 14462 = 14322 + crc32(slug) % 1000) and are
  # env-overridable via SHOPSYSTEM_VAULT_API_PORT /
  # SHOPSYSTEM_VAULT_PROXY_PORT, mirroring the postgres host-port
  # derivation so two products never bind the same broker host port.
  agent-vault:
    image: infisical/agent-vault:latest
    container_name: shopsystem-agent-vault
    networks:
      - shopsystem
    cap_add:
      - IPC_LOCK
    environment:
      AGENT_VAULT_MASTER_PASSWORD: "${AGENT_VAULT_MASTER_PASSWORD}"
      # Credential-injection-proxy rate-limit profile. DISABLED BY DEFAULT,
      # fleet-wide, opt-in to re-enable (pinned product decision, brief 016):
      # unset => "off" => the broker does not throttle. The explicit "off"
      # default (matching this file's ${VAR:-default} idiom) means an unset
      # instance var renders to "off" with no compose "variable is not set"
      # warning; any non-off value opts back in and the broker re-enforces a
      # limit.
      AGENT_VAULT_RATELIMIT_PROFILE: "${AGENT_VAULT_RATELIMIT_PROFILE:-off}"
    volumes:
      - type: volume
        source: shopsystem-agent-vault-data
        target: /data
    ports:
      - "${SHOPSYSTEM_VAULT_API_PORT:-15082}:14321"
      - "${SHOPSYSTEM_VAULT_PROXY_PORT:-14462}:14322"
    healthcheck:
      # sh-compatible TCP-liveness probe on the broker API port. The
      # infisical/agent-vault image runs sh (no bash), so the bash-only
      # device-file redirect probe can never work here; nc is shipped at
      # /usr/bin/nc.
      test: ["CMD", "nc", "-z", "127.0.0.1", "14321"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  shopsystem:
    name: shopsystem

volumes:
  shopsystem-agent-vault-data:
    name: shopsystem-agent-vault-data
