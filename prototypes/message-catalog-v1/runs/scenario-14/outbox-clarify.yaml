question: 'The three assigned scenarios pin the happy paths (work_done read, clarify
  read) and the missing-file miss path, but they do not pin the validation-failure
  path: an outbox file that exists and is valid YAML but does not match the BCResponse
  union (e.g., message_type=''nonsense'' or a Clarify missing ''question''). cli.py
  implements this case (try/except ValidationError -> stderr + exit 1), but no scenario
  locks it down. A future ''simplification'' could remove the try/except and let a
  Pydantic ValidationError propagate as an unhandled traceback; all 3 current scenarios
  would still pass. Propose adding a 4th scenario: ''Given an empty BC at a temporary
  path / And the BC''s outbox already contains a file named "lead-099-clarify.yaml"
  (containing valid YAML but missing the required ''question'' field) / When I run
  shop-msg read outbox with work-id "lead-099" / Then the command exits non-zero /
  And stderr explains the outbox response failed schema validation''. This pins graceful-degradation-on-malformed-content
  as a contract, not an accident.'
