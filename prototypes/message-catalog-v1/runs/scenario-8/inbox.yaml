message_type: request_bugfix
work_id: lead-008
description: "Tighten input validation across the catalog so the CLI cannot be weaponized\
  \ via crafted arguments. Three additive scenarios:\n  (1) work_id containing path\
  \ separators (\"/\" or \"..\") must be refused;\n  (2) empty work_id must be refused;\n\
  \  (3) empty question must be refused.\nRecommended implementation: enforce at the\
  \ schema level (Pydantic Field constraints on Clarify.work_id with a `^[a-zA-Z0-9-]+$`-style\
  \ pattern; Clarify.question with min_length=1) so all callers get the validation\
  \ for free, including the CLI and any future tools that build the messages. The\
  \ work_id pattern rejects both path separators and emptiness in one rule. All five\
  \ BC scenarios (the existing two: b9ed9c63b8ccb208, b6973413b7bfdd12 + these three\
  \ new) must pass. Scenarios are additive; nothing is superseded."
