summary: |
  Reviewed request_bugfix lead-008 (input validation tightening on Clarify).
  All 5 BDD scenarios pass in shop-msg-bc; bc-shop's 6/6 also green (no
  cross-BC regression). The Pydantic constraints on Clarify (work_id
  pattern ^[a-zA-Z0-9-]+$ with min_length=1, question min_length=1) close
  the three weaponization vectors the lead pinned: path separators,
  empty work_id, empty question.

  Adversarial probes considered:
  - Path computation occurs before Clarify(...) in cli.py (out_path is
    built from raw args.work_id, then existence-checked). Verified that
    Pydantic's ValidationError fires before out_path.open("w"), so even
    for "../escape" no file is written anywhere. The schema-level fix
    is sufficient; defense-in-depth path sanitization in cli.py is not
    pinned by any scenario but is also not needed for the pinned cases.
  - Scope of constraint to Clarify only (not WorkDone, RequestMaintenance,
    AssignScenarios, RequestBugfix). Defensible: shop-msg CLI only writes
    Clarify; the other LeadMessage types are written by the lead BC, which
    will tighten when it grows a CLI. Not a behavioral gap for this slice.
  - Forward-slash-only work_id (e.g., "lead/001") is not pinned by a
    distinct scenario, but the pattern rejects "/" and "." together with
    the "../escape" case; the scenario name "path separator" reasonably
    covers the family.
  - Whitespace-only question ("   ") would pass min_length=1. Out of scope
    for "weaponization" framing; the bugfix description pinned empty only.
  - Step-def change from parsers.parse to parsers.re in the existing When
    step is necessary for empty-string capture and does not regress the
    happy-path or collision scenarios (verified by green suite).
  - New "outbox is empty" Then step: correct (iterdir() on the
    Given-created outbox dir; no fixture state leakage).

  No scenario gap surfaced that would change a reasonable implementation.
  Signing off.
