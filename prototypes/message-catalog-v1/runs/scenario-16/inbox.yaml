message_type: request_bugfix
work_id: lead-018
description: "Tighten ScenarioPayload: require the 'hash' field to equal the canonical\
  \ scenario-hash of the 'gherkin' field. Currently a consumer can construct ScenarioPayload(hash='wrong-string',\
  \ tags=[...], gherkin=<valid body>) and Pydantic does not check that 'hash' matches\
  \ what scenarios.hash.compute_scenario_hash(gherkin) would produce; the consistency\
  \ is today guaranteed only by the lead-side 'shop-msg send' CLI's hash-computation\
  \ step, which leaves any hand-constructed or test-constructed payload free to carry\
  \ mismatched values. Add a Pydantic @model_validator(mode='after') on ScenarioPayload\
  \ that raises ValidationError when hash does not equal the canonical hash of the\
  \ gherkin body. DESIGN TENSION: catalog must not import from scenarios in normal\
  \ production code (memory shop-system-package-boundaries). Resolution is the Implementer's\
  \ call \u2014 options include (a) injecting a canonicalization callable into the\
  \ validator at construction time, (b) duplicating the (small, stable) canonicalization\
  \ rule inside catalog, (c) a producer-side check the catalog re-runs without importing\
  \ scenarios, or (d) any other design that preserves the boundary. Pick whichever\
  \ feels right. ADDITIVE \u2014 all prior scenarios + tests must continue to pass;\
  \ the new validator must accept every payload 'shop-msg send' currently produces.\
  \ Test placement is the Implementer's call (catalog/tests/test_scenario_payload.py\
  \ for direct schema tests; shop-msg-bc/features/ for the CLI round-trip scenario)."
