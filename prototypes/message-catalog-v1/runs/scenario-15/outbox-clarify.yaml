question: 'Scenario gap: the schema validator regex r''@bc:\S+'' uses .search() with
  no line anchor, so a gherkin whose only @bc: occurrence is inside a step''s quoted
  content (e.g., ''Given the file mentions "@bc:fake" in passing'') passes validation
  even when no real tag line exists. Scenario 2 pins only the no-@bc:-anywhere case.
  Propose adding a third scenario: ''Scenario: ScenarioPayload with @bc only inside
  a step text is rejected / Given a gherkin body where the substring @bc:foo appears
  only inside a Given/When/Then step''s quoted content (no tag line) / When I construct
  a ScenarioPayload from that gherkin via Pydantic / Then Pydantic raises ValidationError
  identifying the missing @bc tag.'' This pins the line-anchor intent so the regex
  cannot be silently relaxed.'
