message_type: request_bugfix
work_id: lead-017
description: "Tighten the @bc: tag schema constraint on ScenarioPayload to require\
  \ a TAG LINE rather than any substring. The Reviewer of lead-016 demonstrated empirically\
  \ that the current r'@bc:\\\\S+' .search() accepts a gherkin whose only @bc: occurrence\
  \ is inside a step's quoted content (e.g., 'Given the file mentions \"@bc:fake\"\
  \ in passing'). The intent is 'the gherkin has a tag-line containing @bc:<name>'.\
  \ Tighten the regex (or use line-by-line scanning) so that @bc: must appear as a\
  \ whitespace-bounded token on some line \u2014 typically a pytest-bdd tag line like\
  \ '@scenario_hash:abc @bc:test'. ADDITIVE: all 22 prior shop-msg-bc scenarios +\
  \ 4 catalog tests + 6 scenarios + 6 bc-shop must continue to pass; the new scenario\
  \ is an additional schema-reject case beyond the existing missing-@bc and present-@bc\
  \ cases."
