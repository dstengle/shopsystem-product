message_type: request_bugfix
work_id: lead-016
description: "Tighten ScenarioPayload: require gherkin to carry a @bc:<name> tag.\
  \ Currently a convention enforced only by the lead-side CLI's --bc-tag flag; nothing\
  \ prevents a hand-constructed ScenarioPayload from reaching a BC without one. Add\
  \ a Pydantic @model_validator(mode='after') on ScenarioPayload that fails ValidationError\
  \ when the gherkin string contains no line matching the @bc:<name> pattern. Three\
  \ additive scenarios: schema-accept happy path, schema-reject missing-tag, integration\
  \ check that shop-msg send assign_scenarios continues to produce the tag. ADDITIVE\
  \ \u2014 all 21 prior scenarios + 6 scenarios unit tests + 6 bc-shop tests must\
  \ continue to pass. Test placement is the Implementer's call (catalog/tests/ for\
  \ direct schema tests is fine; shop-msg-bc/features/ for integration-flavor scenarios\
  \ is also fine; mix is fine)."
