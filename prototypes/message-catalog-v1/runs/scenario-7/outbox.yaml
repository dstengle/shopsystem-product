summary: |
  BDD re-run: 2 passed, 0 failed. Both the original happy-path scenario
  (b9ed9c63b8ccb208) and the new collision scenario (b6973413b7bfdd12)
  pass against the post-bugfix BC.

  Implementation faithfully realizes the request_bugfix contract:
  shop-msg respond clarify checks `out_path.exists()` BEFORE constructing
  or writing the Clarify message, prints a stderr message naming the
  conflicting path, and returns exit code 1. The preexisting file is
  not opened, truncated, or modified.

  The refactor of the existing `When` step is correct: the prior
  inline `returncode == 0` assertion is moved into the happy-path
  `Then the BC's outbox contains a file named "..."` step so the
  collision scenario can share the same When phrasing while expecting
  non-zero exit. Both Then branches assert their expected exit code,
  so a failing CLI cannot silently slip past either scenario.

  The `outbox_file_unchanged` step compares byte-identical contents
  against bytes captured at Given time; partial writes, truncate-then-
  same-content writes, and metadata-only changes would all surface.

  Adversarial probes considered and dismissed:
  - Symlinks at the target path: `Path.exists()` follows symlinks, so
    refusal is consistent. Broken-symlink edge case is path-traversal-
    adjacent and explicitly deferred by the lead.
  - File-vs-directory collision at the target path: `exists()` covers
    both; refusal is the right behavior for either.
  - Same-content collision (preexisting file bytes happen to equal the
    would-be-written bytes): CLI still refuses. The lead's text says
    refuse when the file "already exists" — unconditional on content;
    the scenario pins existence-triggered refusal with seeded bytes
    that differ from a valid Clarify, so no ambiguity.
  - mkdir runs before the existence check: harmless; outbox is seeded
    by the empty_bc fixture anyway and `exist_ok=True` is idempotent.

  Two boundaries remain deferred (lead's previous clarify flagged them
  as out of scope for this tightening, and they remain so):
  - `--work-id` containing "/" or ".." escapes the outbox directory.
  - Clarify schema accepts empty work_id / empty question.
  Neither is urgent enough to escalate inside this §4.4 loop; folding
  them in now would muddy the validation of the loop itself. They are
  worth separate scenarios in a follow-up slice.
